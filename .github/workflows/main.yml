name: ACEest CI/CD Pipeline

on:
  push:
    branches:
      - main
      - "version/*"
  pull_request:
    branches:
      - main

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Lint with Flake8
        run: flake8 app.py --max-line-length=120 --count

      - name: Run Pytest
        run: pytest tests/test_app.py -v --cov=app --cov-report=term-missing

  docker-build:
    name: Docker Build and Smoke Test
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t aceest-fitness:latest .

      - name: Smoke Test
        run: |
          docker run -d --name aceest-test -p 5000:5000 aceest-fitness:latest
          sleep 5
          curl --fail http://localhost:5000/health
          docker stop aceest-test
          docker rm aceest-test