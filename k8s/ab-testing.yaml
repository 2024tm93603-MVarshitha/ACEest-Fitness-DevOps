apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-variant-a
spec:
  replicas: 3
  selector:
    matchLabels:
      app: aceest
      variant: a
  template:
    metadata:
      labels:
        app: aceest
        variant: a
    spec:
      containers:
      - name: aceest
        image: 2024tm93603mvarshitha/aceest-fitness:v2
        ports:
        - containerPort: 5000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-variant-b
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aceest
      variant: b
  template:
    metadata:
      labels:
        app: aceest
        variant: b
    spec:
      containers:
      - name: aceest
        image: 2024tm93603mvarshitha/aceest-fitness:v3
        ports:
        - containerPort: 5000
