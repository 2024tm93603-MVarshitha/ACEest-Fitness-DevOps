apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-v2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aceest
      version: v2
  template:
    metadata:
      labels:
        app: aceest
        version: v2
    spec:
      containers:
      - name: aceest-fitness
        image: 2024tm93603mvarshitha/aceest-fitness:v3
        ports:
        - containerPort: 5000
