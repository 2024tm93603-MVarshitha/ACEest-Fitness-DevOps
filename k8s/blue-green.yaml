apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-blue
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest
      version: blue
  template:
    metadata:
      labels:
        app: aceest
        version: blue
    spec:
      containers:
      - name: aceest
        image: 2024tm93603mvarshitha/aceest-fitness:v2
        ports:
        - containerPort: 5000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-green
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest
      version: green
  template:
    metadata:
      labels:
        app: aceest
        version: green
    spec:
      containers:
      - name: aceest
        image: 2024tm93603mvarshitha/aceest-fitness:v3
        ports:
        - containerPort: 5000
