apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-green
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aceest
      slot: green
  template:
    metadata:
      labels:
        app: aceest
        slot: green
    spec:
      containers:
      - name: aceest-fitness
        image: 2024tm93603mvarshitha/aceest-fitness:v2
        ports:
        - containerPort: 5000
