apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-canary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aceest
      track: canary
  template:
    metadata:
      labels:
        app: aceest
        track: canary
    spec:
      containers:
      - name: aceest-fitness
        image: 2024tm93603mvarshitha/aceest-fitness:v3
        ports:
        - containerPort: 5000
