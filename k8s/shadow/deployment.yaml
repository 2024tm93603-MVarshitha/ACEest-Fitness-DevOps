apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-shadow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aceest
      track: shadow
  template:
    metadata:
      labels:
        app: aceest
        track: shadow
    spec:
      containers:
      - name: aceest-fitness
        image: 2024tm93603mvarshitha/aceest-fitness:v2
        ports:
        - containerPort: 5000
